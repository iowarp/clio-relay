name: publish validated candidate to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing draft release tag, such as v1.0.11
        required: true
        type: string
      reviewed_main_sha:
        description: Exact reviewed origin/main commit that the tag must identify
        required: true
        type: string

concurrency:
  group: clio-relay-release-${{ inputs.tag }}
  cancel-in-progress: false

permissions: {}

jobs:
  authorize:
    name: reject non-main dispatch before protected environments
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Fail closed if the dispatch identity check cannot complete.
    permissions: {}
    outputs:
      workflow_sha: ${{ steps.dispatch.outputs.workflow_sha }}
    steps:
      - name: require protected-main workflow identity
        id: dispatch
        env:
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          REVIEWED_MAIN_SHA: ${{ inputs.reviewed_main_sha }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          test "$DISPATCH_REF" = "refs/heads/main"
          [[ "$DISPATCH_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$REVIEWED_MAIN_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          echo "workflow_sha=$DISPATCH_SHA" >> "$GITHUB_OUTPUT"

  gate:
    name: verify candidate evidence before publication
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Bound candidate download, policy evaluation, and sealing.
    needs: authorize
    permissions:
      actions: read  # Read protected environment, governance, and run metadata.
      contents: read
      attestations: read  # Verify evidence attestations before PyPI publication.
    outputs:
      source_commit: ${{ steps.release.outputs.source_commit }}
      version: ${{ steps.release.outputs.version }}
      wheel_sha256: ${{ steps.candidate.outputs.wheel_sha256 }}
      workflow_sha: ${{ needs.authorize.outputs.workflow_sha }}

    steps:
      - name: validate tag input
        env:
          TAG_NAME: ${{ inputs.tag }}
          REVIEWED_MAIN_SHA: ${{ inputs.reviewed_main_sha }}
        shell: bash
        run: |
          [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          [[ "$REVIEWED_MAIN_SHA" =~ ^[0-9a-f]{40}$ ]]

      - name: check out the protected-main verifier commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.authorize.outputs.workflow_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.11.28"

      - name: set up python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: install protected-main locked dependencies
        run: uv sync --locked --all-groups

      - name: require protected-main dispatch and an unpublished exact-tag draft
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag }}
          REVIEWED_MAIN_SHA: ${{ inputs.reviewed_main_sha }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
        shell: bash
        run: |
          source_commit="$(gh api "repos/$REPOSITORY/commits/$TAG_NAME" --jq .sha)"
          source .github/scripts/authenticated-git.sh
          relay_authenticated_git_fetch --force --no-tags origin \
            refs/heads/main:refs/remotes/origin/main
          test "$DISPATCH_REF" = "refs/heads/main"
          test "$DISPATCH_SHA" = "$(git rev-parse refs/remotes/origin/main)"
          test "$source_commit" = "$(git rev-parse HEAD)"
          test "$(git rev-list -n 1 "$TAG_NAME")" = "$source_commit"
          test "$source_commit" = "$REVIEWED_MAIN_SHA"
          test "$source_commit" = "$DISPATCH_SHA"
          test "$source_commit" = "$(git rev-parse refs/remotes/origin/main)"
          python src/clio_relay/ci_validation.py verify-live-release \
            --repository "$REPOSITORY" \
            --tag "$TAG_NAME" \
            --source-commit "$source_commit" \
            --draft true \
            --prerelease false
          policy_version="$(sed -nE 's/^release_version:[[:space:]]*"([^"]+)"[[:space:]]*$/\1/p' docs/release-gate-1.0.yaml)"
          test -n "$policy_version"
          test "$TAG_NAME" = "v$policy_version"
          echo "source_commit=$source_commit" >> "$GITHUB_OUTPUT"
          echo "version=$policy_version" >> "$GITHUB_OUTPUT"

      - name: preflight bounded candidate report assets
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          mkdir -p candidate/evidence
          source .github/scripts/release-api.sh
          relay_release_resolve "$TAG_NAME" true \
            candidate/evidence/release-metadata-before.json
          relay_release_complete_assets candidate/evidence/release-metadata-before.json \
            candidate/evidence/release-assets-before.json
          python src/clio_relay/ci_validation.py report-assets \
            --release candidate/evidence/release-assets-before.json \
            --kind candidate \
            --matrix examples/release-gate/report-matrix-1.0.json \
            --output candidate/evidence/report-assets-before.json

      - name: download candidate and validation evidence
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          mkdir -p candidate/packages candidate/evidence/live candidate/evidence/recovery
          source .github/scripts/release-api.sh
          release_before=candidate/evidence/release-assets-before.json
          relay_release_download_pattern "$release_before" '*.whl' candidate/packages
          relay_release_download_pattern "$release_before" '*.tar.gz' candidate/packages
          for asset in SHA256SUMS validation-local.json CI-STATUS.json \
            REPOSITORY-GOVERNANCE.json LIVE-VALIDATION-BINDING.json; do
            relay_release_download_exact "$release_before" "$asset" "candidate/evidence/$asset"
          done
          relay_release_download_pattern "$release_before" 'validation-*.json' \
            candidate/evidence/live
          for recovery_asset in candidate-release-gate-1.0.json PYPI-PROMOTION.json; do
            if jq -e --arg name "$recovery_asset" \
              '.release_assets[] | select(.name == $name)' \
              candidate/evidence/report-assets-before.json >/dev/null; then
              relay_release_download_exact "$release_before" "$recovery_asset" \
                "candidate/evidence/recovery/$recovery_asset"
            fi
          done
          relay_release_resolve "$TAG_NAME" true \
            candidate/evidence/release-metadata-after.json
          relay_release_complete_assets candidate/evidence/release-metadata-after.json \
            candidate/evidence/release-assets-after.json
          python src/clio_relay/ci_validation.py report-assets \
            --release candidate/evidence/release-assets-after.json \
            --kind candidate \
            --matrix examples/release-gate/report-matrix-1.0.json \
            --report-dir candidate/evidence/live \
            --output candidate/evidence/report-assets-after.json
          cmp --silent candidate/evidence/report-assets-before.json \
            candidate/evidence/report-assets-after.json

      - name: require the complete prepublication draft asset set
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          {
            find candidate/packages -maxdepth 1 -type f -printf '%f\n'
            printf '%s\n' SHA256SUMS validation-local.json CI-STATUS.json \
              REPOSITORY-GOVERNANCE.json LIVE-VALIDATION-BINDING.json
            find candidate/evidence/live -maxdepth 1 -type f -name 'validation-*.json' -printf '%f\n'
          } | sort --unique > expected-assets.txt
          jq -r '.assets[].name' candidate/evidence/release-assets-after.json \
            | sort > observed-assets.txt
          for recovery_asset in candidate-release-gate-1.0.json PYPI-PROMOTION.json; do
            if grep --fixed-strings --line-regexp --quiet "$recovery_asset" observed-assets.txt; then
              printf '%s\n' "$recovery_asset" >> expected-assets.txt
            fi
          done
          sort --unique --output=expected-assets.txt expected-assets.txt
          if ! diff --unified expected-assets.txt observed-assets.txt; then
            echo "draft release contains assets outside the verified prepublication set" >&2
            exit 1
          fi

      - name: independently verify manifest, metadata, digest, and provenance
        id: candidate
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          mapfile -t wheels < <(find candidate/packages -maxdepth 1 -type f -name '*.whl' | sort)
          mapfile -t sdists < <(find candidate/packages -maxdepth 1 -type f -name '*.tar.gz' | sort)
          test "${#wheels[@]}" -eq 1
          test "${#sdists[@]}" -eq 1
          wheel="${wheels[0]}"
          sdist="${sdists[0]}"
          python src/clio_relay/ci_validation.py distribution-archives \
            --wheel "$wheel" \
            --sdist "$sdist" \
            --project clio-relay \
            --version "$VERSION" \
            --output candidate/evidence/DISTRIBUTION-ARCHIVES.json
          python - "$wheel" "$sdist" candidate/evidence/validation-local.json \
            candidate/evidence/CI-STATUS.json candidate/evidence/REPOSITORY-GOVERNANCE.json \
            candidate/evidence/SHA256SUMS <<'PY'
          import hashlib
          import re
          import sys
          from pathlib import Path

          subjects = {path.name: path for path in map(Path, sys.argv[1:6])}
          manifest = Path(sys.argv[6])
          declared: dict[str, str] = {}
          for line in manifest.read_text(encoding="utf-8").splitlines():
              match = re.fullmatch(r"([0-9a-f]{64}) [ *]([^/\\]+)", line)
              if match is None or match.group(2) in declared:
                  raise SystemExit(f"invalid SHA256SUMS entry: {line!r}")
              declared[match.group(2)] = match.group(1)
          if set(declared) != set(subjects):
              raise SystemExit(
                  f"SHA256SUMS subjects differ: declared={sorted(declared)}, "
                  f"actual={sorted(subjects)}"
              )
          for name, path in subjects.items():
              observed = hashlib.sha256(path.read_bytes()).hexdigest()
              if observed != declared[name]:
                  raise SystemExit(f"SHA-256 mismatch for {name}")
          PY
          wheel_sha256="$(sha256sum "$wheel" | cut -d ' ' -f 1)"
          test "$wheel_sha256" = "$(awk -v name="$(basename "$wheel")" '$2 == "*" name || $2 == name {print $1}' candidate/evidence/SHA256SUMS)"
          for subject in "$wheel" "$sdist" candidate/evidence/validation-local.json \
            candidate/evidence/CI-STATUS.json candidate/evidence/REPOSITORY-GOVERNANCE.json; do
            gh attestation verify "$subject" \
              --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/stage-candidate.yml" \
              --source-ref "refs/heads/main" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
          done
          python src/clio_relay/ci_validation.py verify-ci-status \
            --receipt candidate/evidence/CI-STATUS.json \
            --repository "$REPOSITORY" \
            --source-commit "$SOURCE_COMMIT"
          python src/clio_relay/ci_validation.py verify-live-governance \
            --receipt candidate/evidence/REPOSITORY-GOVERNANCE.json \
            --repository "$REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --tag "$TAG_NAME"
          echo "wheel_sha256=$wheel_sha256" >> "$GITHUB_OUTPUT"

      - name: verify authorized attestations and candidate binding for every live report
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          WHEEL_SHA256: ${{ steps.candidate.outputs.wheel_sha256 }}
        shell: bash
        run: |
          binding=candidate/evidence/LIVE-VALIDATION-BINDING.json
          gh attestation verify "$binding" \
            --repo "$REPOSITORY" \
            --signer-workflow "$REPOSITORY/.github/workflows/live-validation-attest.yml" \
            --source-ref "refs/heads/main" \
            --source-digest "$SOURCE_COMMIT" \
            --deny-self-hosted-runners
          python - "$binding" candidate/evidence/live candidate/evidence/CI-STATUS.json \
            candidate/evidence/REPOSITORY-GOVERNANCE.json \
            candidate/evidence/report-assets-after.json "$TAG_NAME" "$SOURCE_COMMIT" \
            "$VERSION" "$WHEEL_SHA256" <<'PY'
          import hashlib
          import json
          import re
          import sys
          from pathlib import Path

          binding_path = Path(sys.argv[1])
          report_dir = Path(sys.argv[2])
          ci_status_path = Path(sys.argv[3])
          governance_path = Path(sys.argv[4])
          report_manifest_path = Path(sys.argv[5])
          tag, commit, version, wheel_sha256 = sys.argv[6:]
          binding = json.loads(binding_path.read_text(encoding="utf-8"))
          report_manifest = json.loads(report_manifest_path.read_text(encoding="utf-8"))
          matrix_binding = report_manifest.get("acceptance_matrix")
          if not isinstance(matrix_binding, dict):
              raise SystemExit("candidate report manifest has no acceptance matrix binding")
          sealer_id = binding.get("sealer_id")
          expected_binding = {
              "schema_version": binding.get("schema_version") == "1.0",
              "artifact_stage": binding.get("artifact_stage") == "immutable_candidate",
              "tag": binding.get("tag") == tag,
              "source_commit": binding.get("source_commit") == commit,
              "version": binding.get("version") == version,
              "wheel_sha256": binding.get("wheel", {}).get("sha256") == wheel_sha256,
              "ci_status": binding.get("ci_status_sha256")
                  == hashlib.sha256(ci_status_path.read_bytes()).hexdigest(),
              "repository_governance": binding.get("repository_governance_sha256")
                  == hashlib.sha256(governance_path.read_bytes()).hexdigest(),
              "authorized_workflow": binding.get("authorized_workflow")
                  == ".github/workflows/live-validation-attest.yml",
              "trust_model": binding.get("trust_model")
                  == "maintainer_sealed_operator_evidence",
              "producer_scope": binding.get("producer_execution_verified") is False,
              "seal_environment": binding.get("seal_environment") == "live-validation",
              "seal_method": binding.get("seal_method")
                  == "write_capable_maintainer_workflow_dispatch",
              "sealer_login": isinstance(binding.get("sealer_login"), str)
                  and bool(binding["sealer_login"]),
              "sealer_id": isinstance(sealer_id, int)
                  and not isinstance(sealer_id, bool) and sealer_id > 0,
              "sealer_permission": binding.get("sealer_permission")
                  in {"admin", "maintain", "write"},
              "environment_reviewers_not_claimed": binding.get(
                  "environment_reviewers_available"
              ) is False,
              "acceptance_matrix": binding.get("acceptance_matrix") == matrix_binding,
          }
          failed_binding = sorted(
              name for name, passed in expected_binding.items() if not passed
          )
          if failed_binding:
              raise SystemExit(f"invalid live-validation binding: {failed_binding}")
          declared_items = binding.get("reports")
          expected_reports = matrix_binding.get("reports")
          if (
              not isinstance(declared_items, list)
              or not isinstance(expected_reports, list)
              or len(declared_items) != matrix_binding.get("report_count")
              or len(expected_reports) != matrix_binding.get("report_count")
          ):
              raise SystemExit("live-validation binding does not contain the exact matrix")
          declared = {}
          for item in declared_items:
              if not isinstance(item, dict) or not isinstance(item.get("filename"), str):
                  raise SystemExit("live-validation binding report entry is invalid")
              filename = item["filename"]
              if filename in declared:
                  raise SystemExit(f"duplicate bound report filename: {filename}")
              declared[filename] = item
          observed = {}
          report_ids = set()
          invocation_ids = set()
          for expected_report in expected_reports:
              if not isinstance(expected_report, dict):
                  raise SystemExit("candidate matrix report entry is invalid")
              path = report_dir / str(expected_report.get("filename"))
              document = json.loads(path.read_text(encoding="utf-8"))
              observed[path.name] = path
              report_id = document.get("report_id")
              if not isinstance(report_id, str) or not report_id or report_id in report_ids:
                  raise SystemExit(f"invalid or duplicate report id in {path.name}")
              report_ids.add(report_id)
              software = document.get("software", {})
              source = document.get("install_source", {})
              trust = document.get("evidence_trust", {})
              launcher_receipt = source.get("launcher_receipt", {})
              item = declared.get(path.name, {})
              producer_id = trust.get("producer_github_id")
              invocation_id = trust.get("invocation_id")
              checks = {
                  "status": document.get("status") == "passed",
                  "matrix_cluster": document.get("cluster") == expected_report.get("cluster"),
                  "matrix_scenario": document.get("scenario") == expected_report.get("scenario"),
                  "matrix_id": item.get("acceptance_id") == expected_report.get("id"),
                  "matrix_ordinal": item.get("ordinal") == expected_report.get("ordinal"),
                  "version": software.get("version") == version,
                  "tag": software.get("tag") == tag,
                  "commit": software.get("commit") == commit,
                  "clean": software.get("dirty") is False,
                  "distribution_version": source.get("distribution_version") == version,
                  "artifact_sha256": source.get("artifact_sha256") == wheel_sha256,
                  "artifact_identity": source.get("artifact_identity_verified") is True,
                  "source_kind": source.get("kind") == "wheel",
                  "detected_source_kind": source.get("detected_kind") == "wheel",
                  "launcher": source.get("launcher") == "uv-tool",
                  "launcher_verified": source.get("launcher_verified") is True,
                  "launcher_receipt": source.get("launcher_receipt", {}).get("verified") is True,
                  "tool_environment": launcher_receipt.get("tool_environment_verified") is True,
                  "tool_bin_bound": launcher_receipt.get("tool_bin_bound") is True,
                  "tool_target_bound": launcher_receipt.get("tool_target_bound") is True,
                  "record_closure": launcher_receipt.get("distribution_record", {}).get("verified") is True,
                  "candidate_claim": source.get("released_artifact") is False,
                  "producer_login": trust.get("producer_github_login")
                      == item.get("producer_github_login")
                      == item.get("uploader_github_login"),
                  "producer_id": isinstance(producer_id, int)
                      and not isinstance(producer_id, bool)
                      and producer_id > 0
                      and producer_id == item.get("producer_github_id")
                      == item.get("uploader_github_id"),
                  "invocation_id": isinstance(invocation_id, str)
                      and 16 <= len(invocation_id) <= 256
                      and invocation_id == item.get("invocation_id")
                      and invocation_id not in invocation_ids,
                  "launcher_invocation": launcher_receipt.get("invocation_id")
                      == invocation_id,
                  "uv_version": launcher_receipt.get("uv_version") == "0.11.28",
                  "bound_uv_version": launcher_receipt.get("uv_version")
                      == item.get("uv_version"),
                  "uv_executable_sha256": isinstance(
                      launcher_receipt.get("uv_executable_sha256"), str
                  ) and re.fullmatch(
                      r"[0-9a-f]{64}", launcher_receipt["uv_executable_sha256"]
                  ) is not None and launcher_receipt.get("uv_executable_sha256")
                      == item.get("uv_executable_sha256"),
              }
              failed = sorted(name for name, passed in checks.items() if not passed)
              if failed:
                  raise SystemExit(f"candidate binding failed for {path.name}: {failed}")
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              if item.get("sha256") != digest or item.get("report_id") != report_id:
                  raise SystemExit(f"bound digest or report id mismatch for {path.name}")
              if item.get("scenario") != document.get("scenario"):
                  raise SystemExit(f"bound scenario mismatch for {path.name}")
              if item.get("cluster") != document.get("cluster"):
                  raise SystemExit(f"bound cluster mismatch for {path.name}")
              invocation_ids.add(invocation_id)
          if set(declared) != set(observed):
              raise SystemExit(
                  "bound live report set differs from release assets: "
                  f"declared={sorted(declared)}, observed={sorted(observed)}"
              )
          PY
          for report in candidate/evidence/live/validation-*.json; do
            if test "$(basename "$report")" = "validation-local.json"; then
              continue
            fi
            gh attestation verify "$report" \
              --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/live-validation-attest.yml" \
              --source-ref "refs/heads/main" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
          done

      - name: evaluate candidate policy with protected-main code
        env:
          WHEEL_SHA256: ${{ steps.candidate.outputs.wheel_sha256 }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          python - docs/release-gate-1.0.yaml candidate/evidence/candidate-policy.yaml <<'PY'
          import sys
          from pathlib import Path

          source = Path(sys.argv[1])
          destination = Path(sys.argv[2])
          policy = source.read_text(encoding="utf-8")
          replacements = {
              "artifact_stage: published": "artifact_stage: immutable_candidate",
              "require_released_artifact: true": "require_released_artifact: false",
              "allowed_install_sources:\n  - pypi": "allowed_install_sources:\n  - wheel",
          }
          for published, candidate in replacements.items():
              if policy.count(published) != 1:
                  raise SystemExit(f"cannot derive candidate policy: {published!r}")
              policy = policy.replace(published, candidate, 1)
          destination.write_text(policy, encoding="utf-8")
          PY
          uv run --no-sync clio-relay release gate \
            --policy candidate/evidence/candidate-policy.yaml \
            --report-dir candidate/evidence/live \
            --expected-artifact-sha256 "$WHEEL_SHA256" \
            --output candidate/evidence/candidate-release-gate-1.0.json
          python - candidate/evidence/candidate-release-gate-1.0.json \
            candidate/evidence/report-assets-after.json "$WHEEL_SHA256" "$VERSION" <<'PY'
          import json
          import sys
          from pathlib import Path

          decision = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          report_manifest = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))
          matrix = report_manifest["acceptance_matrix"]
          if decision.get("passed") is not True:
              raise SystemExit("release gate decision is not passing")
          if decision.get("artifact_sha256") != sys.argv[3]:
              raise SystemExit("release gate decision is not bound to the candidate digest")
          if decision.get("release_version") != sys.argv[4]:
              raise SystemExit("release gate decision version does not match the tag")
          expected_ids = [item["id"] for item in matrix["reports"]]
          matrix_checks = {
              "schema": decision.get("acceptance_matrix_schema_version")
                  == matrix.get("schema_version"),
              "version": decision.get("acceptance_matrix_release_version")
                  == matrix.get("release_version"),
              "digest": decision.get("acceptance_matrix_sha256") == matrix.get("sha256"),
              "stage": decision.get("acceptance_matrix_stage") == "candidate",
              "ordered_ids": decision.get("acceptance_report_ids") == expected_ids,
              "document_count": len(decision.get("acceptance_report_document_ids", []))
                  == matrix.get("report_count"),
          }
          failed = sorted(name for name, passed in matrix_checks.items() if not passed)
          if failed:
              raise SystemExit(f"candidate gate matrix binding failed: {failed}")
          PY
          rm -f candidate/evidence/live/validation-local.json

      - name: verify any existing recovery assets before publication
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          WHEEL_SHA256: ${{ steps.candidate.outputs.wheel_sha256 }}
        shell: bash
        run: |
          recovery=candidate/evidence/recovery
          if test -f "$recovery/candidate-release-gate-1.0.json"; then
            cmp --silent candidate/evidence/candidate-release-gate-1.0.json \
              "$recovery/candidate-release-gate-1.0.json"
            gh attestation verify "$recovery/candidate-release-gate-1.0.json" \
              --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/release-gate.yml" \
              --source-ref "refs/heads/main" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
          fi
          if test -f "$recovery/PYPI-PROMOTION.json"; then
            test -f "$recovery/candidate-release-gate-1.0.json"
            gh attestation verify "$recovery/PYPI-PROMOTION.json" \
              --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/release-gate.yml" \
              --source-ref "refs/heads/main" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
            python src/clio_relay/promotion_record.py \
              --version "$VERSION" \
              --tag "$TAG_NAME" \
              --source-commit "$SOURCE_COMMIT" \
              --wheel-sha256 "$WHEEL_SHA256" \
              --package-dir candidate/packages \
              --candidate-binding candidate/evidence/LIVE-VALIDATION-BINDING.json \
              --candidate-gate candidate/evidence/candidate-release-gate-1.0.json \
              --verify-existing "$recovery/PYPI-PROMOTION.json"
          fi

      - name: seal the exact validation inputs
        shell: bash
        run: |
          (
            cd candidate/evidence
            sha256sum --binary live/*.json LIVE-VALIDATION-BINDING.json \
              CI-STATUS.json REPOSITORY-GOVERNANCE.json DISTRIBUTION-ARCHIVES.json \
              > VALIDATION-SHA256SUMS
            sha256sum --check --strict VALIDATION-SHA256SUMS
          )

      - name: revalidate protected main before persisting promotion payload
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: >-
          python src/clio_relay/ci_validation.py mutation-authority
          --governance-receipt candidate/evidence/REPOSITORY-GOVERNANCE.json
          --repository "$REPOSITORY"
          --source-commit "$SOURCE_COMMIT"
          --tag "$TAG_NAME"
          --workflow-ref "$GITHUB_REF"
          --workflow-sha "$GITHUB_SHA"
          --release-state present
          --draft true

      - name: upload verified promotion payload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verified-release-${{ inputs.tag }}
          path: |
            candidate/packages/*.whl
            candidate/packages/*.tar.gz
            candidate/evidence/SHA256SUMS
            candidate/evidence/validation-local.json
            candidate/evidence/CI-STATUS.json
            candidate/evidence/REPOSITORY-GOVERNANCE.json
            candidate/evidence/DISTRIBUTION-ARCHIVES.json
            candidate/evidence/LIVE-VALIDATION-BINDING.json
            candidate/evidence/candidate-release-gate-1.0.json
            candidate/evidence/VALIDATION-SHA256SUMS
            candidate/evidence/live/validation-*.json
            candidate/evidence/recovery/candidate-release-gate-1.0.json
            candidate/evidence/recovery/PYPI-PROMOTION.json
          if-no-files-found: error
          retention-days: 90

  publish-pypi:
    name: publish the gated bytes to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Allows bounded index propagation retries without an open-ended job.
    needs: gate
    if: github.repository == 'iowarp/clio-relay'
    environment:
      name: pypi
      url: https://pypi.org/project/clio-relay/${{ needs.gate.outputs.version }}/
    permissions:
      actions: read  # Read environment metadata and the exact same-run payload artifact.
      contents: write  # Attach the signed PyPI record to the draft release.
      id-token: write  # Mint trusted-publishing and evidence-signing identities.
      attestations: write  # Verify and persist publication attestations.
      artifact-metadata: write  # Link publication evidence to artifact records.

    steps:
      - name: check out the protected-main publication commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.gate.outputs.workflow_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: set up protected-main python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: preflight the exact same-run promotion artifact
        id: promotion_artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ needs.gate.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          preflight="$RUNNER_TEMP/promotion-artifact-preflight"
          rm -rf "$preflight"
          mkdir "$preflight"
          gh api "repos/$REPOSITORY/actions/runs/$RUN_ID/attempts/$RUN_ATTEMPT" \
            > "$preflight/run.json"
          gh api "repos/$REPOSITORY/actions/runs/$RUN_ID/artifacts?per_page=100" \
            > "$preflight/artifacts.json"
          python src/clio_relay/ci_validation.py actions-artifact-manifest \
            --run "$preflight/run.json" \
            --artifacts "$preflight/artifacts.json" \
            --repository "$REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --tag "$TAG_NAME" \
            --run-id "$RUN_ID" \
            --run-attempt "$RUN_ATTEMPT" \
            --artifact-name "verified-release-$TAG_NAME" \
            --artifact-kind promotion \
            --output "$preflight/ARTIFACT.json"
          artifact_id="$(jq -r .artifact.id "$preflight/ARTIFACT.json")"
          [[ "$artifact_id" =~ ^[1-9][0-9]*$ ]]
          echo "artifact_id=$artifact_id" >> "$GITHUB_OUTPUT"
          echo "manifest=$preflight/ARTIFACT.json" >> "$GITHUB_OUTPUT"

      - name: download promotion by artifact id and verify API digest
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ARTIFACT_ID: ${{ steps.promotion_artifact.outputs.artifact_id }}
          ARTIFACT_MANIFEST: ${{ steps.promotion_artifact.outputs.manifest }}
        shell: bash
        run: |
          rm -rf promotion "$RUNNER_TEMP/promotion.zip"
          gh api "repos/$REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" \
            > "$RUNNER_TEMP/promotion.zip"
          python src/clio_relay/ci_validation.py extract-actions-artifact \
            --manifest "$ARTIFACT_MANIFEST" \
            --archive "$RUNNER_TEMP/promotion.zip" \
            --output-dir promotion

      - name: reverify reviewed main and draft assets immediately before PyPI
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          REVIEWED_MAIN_SHA: ${{ inputs.reviewed_main_sha }}
          SOURCE_COMMIT: ${{ needs.gate.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          source .github/scripts/authenticated-git.sh
          source .github/scripts/release-api.sh
          relay_authenticated_git_fetch --force --no-tags origin \
            refs/heads/main:refs/remotes/origin/main
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_SHA" = "$SOURCE_COMMIT"
          test "$SOURCE_COMMIT" = "$REVIEWED_MAIN_SHA"
          test "$SOURCE_COMMIT" = "$(git rev-parse refs/remotes/origin/main)"
          relay_release_resolve "$TAG_NAME" true "$RUNNER_TEMP/publish-release-metadata.json"
          relay_release_complete_assets "$RUNNER_TEMP/publish-release-metadata.json" \
            "$RUNNER_TEMP/publish-release-assets.json"
          python src/clio_relay/ci_validation.py report-assets \
            --release "$RUNNER_TEMP/publish-release-assets.json" \
            --kind candidate \
            --matrix examples/release-gate/report-matrix-1.0.json \
            --output "$RUNNER_TEMP/publish-report-assets.json"
          {
            find promotion/packages -maxdepth 1 -type f -printf '%f\n'
            printf '%s\n' SHA256SUMS validation-local.json CI-STATUS.json \
              REPOSITORY-GOVERNANCE.json LIVE-VALIDATION-BINDING.json
            find promotion/evidence/live -maxdepth 1 -type f -name 'validation-*.json' -printf '%f\n'
          } | sort --unique > expected-assets.txt
          jq -r '.release_assets[].name' "$RUNNER_TEMP/publish-report-assets.json" \
            | sort > observed-assets.txt
          for recovery_asset in candidate-release-gate-1.0.json PYPI-PROMOTION.json; do
            if grep --fixed-strings --line-regexp --quiet "$recovery_asset" observed-assets.txt; then
              printf '%s\n' "$recovery_asset" >> expected-assets.txt
            fi
          done
          sort --unique --output=expected-assets.txt expected-assets.txt
          diff --unified expected-assets.txt observed-assets.txt

      - name: reverify exact distribution bytes
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ needs.gate.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
          WHEEL_SHA256: ${{ needs.gate.outputs.wheel_sha256 }}
        shell: bash
        run: |
          mapfile -t wheels < <(find promotion/packages -maxdepth 1 -type f -name '*.whl' | sort)
          mapfile -t sdists < <(find promotion/packages -maxdepth 1 -type f -name '*.tar.gz' | sort)
          test "${#wheels[@]}" -eq 1
          test "${#sdists[@]}" -eq 1
          wheel="${wheels[0]}"
          sdist="${sdists[0]}"
          python src/clio_relay/ci_validation.py distribution-archives \
            --wheel "$wheel" \
            --sdist "$sdist" \
            --project clio-relay \
            --version "$VERSION" \
            --output "$RUNNER_TEMP/current-distribution-archives.json"
          cmp --silent promotion/evidence/DISTRIBUTION-ARCHIVES.json \
            "$RUNNER_TEMP/current-distribution-archives.json"
          test "$WHEEL_SHA256" = "$(sha256sum "$wheel" | cut -d ' ' -f 1)"
          for subject in "$wheel" "$sdist" promotion/evidence/validation-local.json \
            promotion/evidence/CI-STATUS.json promotion/evidence/REPOSITORY-GOVERNANCE.json; do
            name="$(basename "$subject")"
            declared="$(awk -v name="$name" '$2 == "*" name || $2 == name {print $1}' promotion/evidence/SHA256SUMS)"
            test -n "$declared"
            test "$declared" = "$(sha256sum "$subject" | cut -d ' ' -f 1)"
            gh attestation verify "$subject" \
              --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/stage-candidate.yml" \
              --source-ref "refs/heads/main" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
          done
          python src/clio_relay/ci_validation.py verify-ci-status \
            --receipt promotion/evidence/CI-STATUS.json \
            --repository "$REPOSITORY" \
            --source-commit "$SOURCE_COMMIT"
          python src/clio_relay/ci_validation.py verify-live-governance \
            --receipt promotion/evidence/REPOSITORY-GOVERNANCE.json \
            --repository "$REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --tag "$TAG_NAME"

      - name: reverify recovery assets immediately before PyPI
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ needs.gate.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
          WHEEL_SHA256: ${{ needs.gate.outputs.wheel_sha256 }}
        shell: bash
        run: |
          recovery=promotion/evidence/recovery
          for asset in candidate-release-gate-1.0.json PYPI-PROMOTION.json; do
            if jq -e --arg name "$asset" \
              '.release_assets[] | select(.name == $name)' \
              "$RUNNER_TEMP/publish-report-assets.json" >/dev/null; then
              test -f "$recovery/$asset"
              expected_size="$(jq -r --arg name "$asset" \
                '.release_assets[] | select(.name == $name) | .size' \
                "$RUNNER_TEMP/publish-report-assets.json")"
              expected_digest="$(jq -r --arg name "$asset" \
                '.release_assets[] | select(.name == $name) | .digest' \
                "$RUNNER_TEMP/publish-report-assets.json")"
              test "$expected_size" = "$(stat --format '%s' "$recovery/$asset")"
              test "$expected_digest" = \
                "sha256:$(sha256sum "$recovery/$asset" | cut -d ' ' -f 1)"
            else
              test ! -e "$recovery/$asset"
            fi
          done
          if test -f "$recovery/candidate-release-gate-1.0.json"; then
            cmp --silent promotion/evidence/candidate-release-gate-1.0.json \
              "$recovery/candidate-release-gate-1.0.json"
            gh attestation verify "$recovery/candidate-release-gate-1.0.json" \
              --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/release-gate.yml" \
              --source-ref "refs/heads/main" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
          fi
          if test -f "$recovery/PYPI-PROMOTION.json"; then
            test -f "$recovery/candidate-release-gate-1.0.json"
            gh attestation verify "$recovery/PYPI-PROMOTION.json" \
              --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/release-gate.yml" \
              --source-ref "refs/heads/main" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
            python src/clio_relay/promotion_record.py \
              --version "$VERSION" \
              --tag "$TAG_NAME" \
              --source-commit "$SOURCE_COMMIT" \
              --wheel-sha256 "$WHEEL_SHA256" \
              --package-dir promotion/packages \
              --candidate-binding promotion/evidence/LIVE-VALIDATION-BINDING.json \
              --candidate-gate promotion/evidence/candidate-release-gate-1.0.json \
              --verify-existing "$recovery/PYPI-PROMOTION.json"
          fi

      - name: verify existing PyPI bytes or mark upload required
        id: pypi_state
        env:
          VERSION: ${{ needs.gate.outputs.version }}
        run: |
          python - "$VERSION" promotion/packages "$GITHUB_OUTPUT" <<'PY'
          import hashlib
          import json
          import sys
          import urllib.error
          import urllib.request
          from pathlib import Path

          version = sys.argv[1]
          package_dir = Path(sys.argv[2])
          output_path = Path(sys.argv[3])
          expected = {
              path.name: hashlib.sha256(path.read_bytes()).hexdigest()
              for path in package_dir.iterdir()
              if path.name.endswith((".whl", ".tar.gz"))
          }
          if len(expected) != 2:
              raise SystemExit(f"expected exactly two distribution files, got {sorted(expected)}")
          url = f"https://pypi.org/pypi/clio-relay/{version}/json"
          observed: dict[str, str] = {}
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  content = response.read(4 * 1024 * 1024 + 1)
              if len(content) > 4 * 1024 * 1024:
                  raise SystemExit("PyPI project metadata exceeds the bounded response size")
              document = json.loads(content)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          else:
              for item in document["urls"]:
                  filename = item["filename"]
                  if filename in observed:
                      raise SystemExit(f"PyPI returned duplicate filename: {filename}")
                  observed[filename] = item["digests"]["sha256"]
          unexpected = sorted(set(observed) - set(expected))
          mismatched = sorted(
              filename
              for filename in set(observed) & set(expected)
              if observed[filename] != expected[filename]
          )
          if unexpected or mismatched:
              raise SystemExit(
                  f"PyPI {version} conflicts with the candidate: "
                  f"unexpected={unexpected}, mismatched={mismatched}"
              )
          missing = sorted(set(expected) - set(observed))
          with output_path.open("a", encoding="utf-8") as stream:
              stream.write(f"publish_required={'true' if missing else 'false'}\n")
          PY

      - name: revalidate protected main immediately before PyPI
        if: steps.pypi_state.outputs.publish_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ needs.gate.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          source .github/scripts/release-api.sh
          relay_release_resolve "$TAG_NAME" true \
            "$RUNNER_TEMP/pre-pypi-release-metadata.json"
          relay_release_complete_assets "$RUNNER_TEMP/pre-pypi-release-metadata.json" \
            "$RUNNER_TEMP/pre-pypi-release-assets.json"
          python src/clio_relay/ci_validation.py report-assets \
            --release "$RUNNER_TEMP/pre-pypi-release-assets.json" \
            --kind candidate \
            --matrix examples/release-gate/report-matrix-1.0.json \
            --output "$RUNNER_TEMP/pre-pypi-report-assets.json"
          cmp --silent "$RUNNER_TEMP/publish-report-assets.json" \
            "$RUNNER_TEMP/pre-pypi-report-assets.json"
          python src/clio_relay/ci_validation.py mutation-authority \
            --governance-receipt promotion/evidence/REPOSITORY-GOVERNANCE.json \
            --repository "$REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --tag "$TAG_NAME" \
            --workflow-ref "$GITHUB_REF" \
            --workflow-sha "$GITHUB_SHA" \
            --release-state present \
            --draft true

      - name: publish exact wheel and source distribution
        if: steps.pypi_state.outputs.publish_required == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: promotion/packages/
          skip-existing: true

      - name: verify PyPI exposes the exact promoted files
        env:
          VERSION: ${{ needs.gate.outputs.version }}
        run: |
          python - "$VERSION" promotion/packages <<'PY'
          import hashlib
          import json
          import sys
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          version = sys.argv[1]
          package_dir = Path(sys.argv[2])
          expected = {
              path.name: hashlib.sha256(path.read_bytes()).hexdigest()
              for path in package_dir.iterdir()
              if path.name.endswith((".whl", ".tar.gz"))
          }
          url = f"https://pypi.org/pypi/clio-relay/{version}/json"
          observed: dict[str, str] = {}
          for attempt in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=30) as response:
                      content = response.read(4 * 1024 * 1024 + 1)
                  if len(content) > 4 * 1024 * 1024:
                      raise SystemExit("PyPI project metadata exceeds the bounded response size")
                  document = json.loads(content)
                  observed = {
                      item["filename"]: item["digests"]["sha256"]
                      for item in document["urls"]
                  }
                  if observed == expected:
                      raise SystemExit(0)
              except urllib.error.HTTPError as exc:
                  if exc.code != 404:
                      raise
              if attempt != 11:
                  time.sleep(10)
          raise SystemExit(
              f"PyPI files do not match candidate: expected={expected}, observed={observed}"
          )
          PY

      - name: record exact PyPI publication while the GitHub release remains draft
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ needs.gate.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
          WHEEL_SHA256: ${{ needs.gate.outputs.wheel_sha256 }}
        shell: bash
        run: |
          source .github/scripts/release-api.sh
          relay_release_resolve "$TAG_NAME" true "$RUNNER_TEMP/pypi-record-release.json"
          python src/clio_relay/promotion_record.py \
            --version "$VERSION" \
            --tag "$TAG_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --wheel-sha256 "$WHEEL_SHA256" \
            --package-dir promotion/packages \
            --candidate-binding promotion/evidence/LIVE-VALIDATION-BINDING.json \
            --candidate-gate promotion/evidence/candidate-release-gate-1.0.json \
            --output promotion/evidence/PYPI-PROMOTION.json

      - name: revalidate protected main immediately before publication attestation
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ needs.gate.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: >-
          python src/clio_relay/ci_validation.py mutation-authority
          --governance-receipt promotion/evidence/REPOSITORY-GOVERNANCE.json
          --repository "$REPOSITORY"
          --source-commit "$SOURCE_COMMIT"
          --tag "$TAG_NAME"
          --workflow-ref "$GITHUB_REF"
          --workflow-sha "$GITHUB_SHA"
          --release-state present
          --draft true

      - name: attest the publication record and candidate decision
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            promotion/evidence/PYPI-PROMOTION.json
            promotion/evidence/candidate-release-gate-1.0.json

      - name: attach publication evidence without finalizing the draft
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ needs.gate.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          source .github/scripts/release-api.sh
          python src/clio_relay/ci_validation.py mutation-authority \
            --governance-receipt promotion/evidence/REPOSITORY-GOVERNANCE.json \
            --repository "$REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --tag "$TAG_NAME" \
            --workflow-ref "$GITHUB_REF" \
            --workflow-sha "$GITHUB_SHA" \
            --release-state present \
            --draft true
          relay_release_resolve "$TAG_NAME" true "$RUNNER_TEMP/attach-release-metadata.json"
          relay_release_complete_assets "$RUNNER_TEMP/attach-release-metadata.json" \
            "$RUNNER_TEMP/attach-release-assets.json"
          python src/clio_relay/ci_validation.py report-assets \
            --release "$RUNNER_TEMP/attach-release-assets.json" \
            --kind candidate \
            --matrix examples/release-gate/report-matrix-1.0.json \
            --output "$RUNNER_TEMP/attach-report-assets.json"
          mkdir -p existing-publication
          for evidence in promotion/evidence/PYPI-PROMOTION.json \
            promotion/evidence/candidate-release-gate-1.0.json; do
            asset="$(basename "$evidence")"
            rm -f "existing-publication/$asset"
            if jq -e --arg name "$asset" \
              '.release_assets[] | select(.name == $name)' \
              "$RUNNER_TEMP/attach-report-assets.json" >/dev/null; then
              relay_release_download_exact "$RUNNER_TEMP/attach-release-assets.json" \
                "$asset" "existing-publication/$asset"
              cmp --silent "$evidence" "existing-publication/$asset"
            else
              python src/clio_relay/ci_validation.py mutation-authority \
                --governance-receipt promotion/evidence/REPOSITORY-GOVERNANCE.json \
                --repository "$REPOSITORY" \
                --source-commit "$SOURCE_COMMIT" \
                --tag "$TAG_NAME" \
                --workflow-ref "$GITHUB_REF" \
                --workflow-sha "$GITHUB_SHA" \
                --release-state present \
                --draft true
              relay_release_upload_exact "$RUNNER_TEMP/attach-release-assets.json" "$evidence"
            fi
          done
          relay_release_resolve "$TAG_NAME" true "$RUNNER_TEMP/attach-release-final.json"
