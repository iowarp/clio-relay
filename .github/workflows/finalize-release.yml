name: finalize released-artifact validated release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: PyPI-published draft with sealed released-artifact evidence
        required: true
        type: string
      reviewed_main_sha:
        description: Exact reviewed origin/main commit that the tag must identify
        required: true
        type: string

concurrency:
  group: clio-relay-release-${{ inputs.tag }}
  cancel-in-progress: false

permissions: {}

jobs:
  authorize:
    name: reject non-main dispatch before protected environment
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Fail closed if the dispatch identity check cannot complete.
    permissions: {}
    outputs:
      workflow_sha: ${{ steps.dispatch.outputs.workflow_sha }}
    steps:
      - name: require protected-main workflow identity
        id: dispatch
        env:
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          REVIEWED_MAIN_SHA: ${{ inputs.reviewed_main_sha }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          test "$DISPATCH_REF" = "refs/heads/main"
          [[ "$DISPATCH_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$REVIEWED_MAIN_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          echo "workflow_sha=$DISPATCH_SHA" >> "$GITHUB_OUTPUT"

  finalize:
    name: verify released evidence and publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Bound final chain verification and the atomic publication sequence.
    needs: authorize
    environment:
      name: release-finalization
    permissions:
      actions: read  # Read protected environment and effective governance metadata.
      contents: write  # Attach claims and publish the validated draft release.
      id-token: write  # Mint the identity used to sign the literal claim set.
      attestations: write  # Verify the chain and persist the claims attestation.
      artifact-metadata: write  # Link claims to GitHub's artifact record.

    steps:
      - name: validate tag input
        env:
          TAG_NAME: ${{ inputs.tag }}
          REVIEWED_MAIN_SHA: ${{ inputs.reviewed_main_sha }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
        shell: bash
        run: |
          [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          [[ "$REVIEWED_MAIN_SHA" =~ ^[0-9a-f]{40}$ ]]

      - name: check out the protected-main verifier commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.authorize.outputs.workflow_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: set up python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: mint repository-scoped administration-read token
        id: admin_read
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.IMMUTABLE_RELEASES_APP_ID }}
          private-key: ${{ secrets.IMMUTABLE_RELEASES_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-administration: read

      - name: expose administration-read token to governance checks
        env:
          ADMIN_READ_TOKEN: ${{ steps.admin_read.outputs.token }}
        shell: bash
        run: echo "GH_ADMIN_READ_TOKEN=$ADMIN_READ_TOKEN" >> "$GITHUB_ENV"

      - name: require protected-main dispatch and an exact-tag release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag }}
          REVIEWED_MAIN_SHA: ${{ inputs.reviewed_main_sha }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
        shell: bash
        run: |
          source .github/scripts/authenticated-git.sh
          source .github/scripts/release-api.sh
          relay_authenticated_git_fetch --force --no-tags origin \
            refs/heads/main:refs/remotes/origin/main
          test "$DISPATCH_REF" = "refs/heads/main"
          test "$DISPATCH_SHA" = "$(git rev-parse refs/remotes/origin/main)"
          test "$DISPATCH_SHA" = "$(git rev-parse HEAD)"
          test "$(git rev-list -n 1 "$TAG_NAME")" = "$DISPATCH_SHA"
          test "$DISPATCH_SHA" = "$REVIEWED_MAIN_SHA"
          python src/clio_relay/ci_validation.py verify-live-release \
            --repository "$REPOSITORY" \
            --tag "$TAG_NAME" \
            --source-commit "$DISPATCH_SHA" \
            --draft any \
            --prerelease false
          relay_release_resolve "$TAG_NAME" any "$RUNNER_TEMP/finalize-release.json"
          test "$(jq -r .prerelease "$RUNNER_TEMP/finalize-release.json")" = "false"
          is_draft="$(jq -r .draft "$RUNNER_TEMP/finalize-release.json")"
          [[ "$is_draft" == "true" || "$is_draft" == "false" ]]
          version="${TAG_NAME#v}"
          policy_version="$(sed -nE 's/^release_version:[[:space:]]*"([^"]+)"[[:space:]]*$/\1/p' docs/release-gate-1.0.yaml)"
          test -n "$policy_version"
          test "$version" = "$policy_version"
          {
            echo "source_commit=$DISPATCH_SHA"
            echo "version=$version"
            echo "is_draft=$is_draft"
          } >> "$GITHUB_OUTPUT"

      - name: preflight bounded final report asset sets
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          mkdir -p finalization/evidence
          source .github/scripts/release-api.sh
          relay_release_resolve "$TAG_NAME" any \
            finalization/evidence/release-metadata-before.json
          relay_release_complete_assets finalization/evidence/release-metadata-before.json \
            finalization/evidence/release-assets-before.json
          python src/clio_relay/ci_validation.py report-assets \
            --release finalization/evidence/release-assets-before.json \
            --kind candidate \
            --matrix examples/release-gate/report-matrix-1.0.json \
            --output finalization/evidence/candidate-report-assets-before.json
          python src/clio_relay/ci_validation.py report-assets \
            --release finalization/evidence/release-assets-before.json \
            --kind released \
            --matrix examples/release-gate/report-matrix-1.0.json \
            --output finalization/evidence/released-report-assets-before.json

      - name: download the complete release evidence chain
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          mkdir -p finalization/packages finalization/evidence/candidate-reports \
            finalization/evidence/released-reports
          source .github/scripts/release-api.sh
          release_before=finalization/evidence/release-assets-before.json
          relay_release_download_pattern "$release_before" '*.whl' finalization/packages
          relay_release_download_pattern "$release_before" '*.tar.gz' finalization/packages
          for asset in SHA256SUMS CI-STATUS.json REPOSITORY-GOVERNANCE.json \
            LIVE-VALIDATION-BINDING.json candidate-release-gate-1.0.json \
            PYPI-PROMOTION.json RELEASED-VALIDATION-BINDING.json \
            released-release-gate-1.0.json; do
            relay_release_download_exact "$release_before" "$asset" \
              "finalization/evidence/$asset"
          done
          relay_release_download_pattern "$release_before" 'validation-*.json' \
            finalization/evidence/candidate-reports
          relay_release_download_pattern "$release_before" 'released-validation-*.json' \
            finalization/evidence/released-reports
          relay_release_resolve "$TAG_NAME" any \
            finalization/evidence/release-metadata-after.json
          relay_release_complete_assets finalization/evidence/release-metadata-after.json \
            finalization/evidence/release-assets-after.json
          python src/clio_relay/ci_validation.py report-assets \
            --release finalization/evidence/release-assets-after.json \
            --kind candidate \
            --matrix examples/release-gate/report-matrix-1.0.json \
            --report-dir finalization/evidence/candidate-reports \
            --output finalization/evidence/candidate-report-assets-after.json
          python src/clio_relay/ci_validation.py report-assets \
            --release finalization/evidence/release-assets-after.json \
            --kind released \
            --matrix examples/release-gate/report-matrix-1.0.json \
            --report-dir finalization/evidence/released-reports \
            --output finalization/evidence/released-report-assets-after.json
          cmp --silent finalization/evidence/candidate-report-assets-before.json \
            finalization/evidence/candidate-report-assets-after.json
          cmp --silent finalization/evidence/released-report-assets-before.json \
            finalization/evidence/released-report-assets-after.json

      - name: verify every authorized attestation in the chain
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          for subject in finalization/packages/*.whl finalization/packages/*.tar.gz \
            finalization/evidence/candidate-reports/validation-local.json \
            finalization/evidence/CI-STATUS.json \
            finalization/evidence/REPOSITORY-GOVERNANCE.json; do
            gh attestation verify "$subject" \
              --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/stage-candidate.yml" \
              --source-ref "refs/heads/main" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
          done
          python src/clio_relay/ci_validation.py verify-ci-status \
            --receipt finalization/evidence/CI-STATUS.json \
            --repository "$REPOSITORY" \
            --source-commit "$SOURCE_COMMIT"
          python src/clio_relay/ci_validation.py verify-live-governance \
            --receipt finalization/evidence/REPOSITORY-GOVERNANCE.json \
            --repository "$REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --tag "$TAG_NAME"
          gh attestation verify finalization/evidence/LIVE-VALIDATION-BINDING.json \
            --repo "$REPOSITORY" \
            --signer-workflow "$REPOSITORY/.github/workflows/live-validation-attest.yml" \
            --source-ref "refs/heads/main" \
            --source-digest "$SOURCE_COMMIT" \
            --deny-self-hosted-runners
          for subject in finalization/evidence/candidate-reports/validation-*.json; do
            if test "$(basename "$subject")" = "validation-local.json"; then
              continue
            fi
            gh attestation verify "$subject" \
              --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/live-validation-attest.yml" \
              --source-ref "refs/heads/main" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
          done
          for subject in finalization/evidence/PYPI-PROMOTION.json \
            finalization/evidence/candidate-release-gate-1.0.json; do
            gh attestation verify "$subject" \
              --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/release-gate.yml" \
              --source-ref "refs/heads/main" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
          done
          for subject in finalization/evidence/RELEASED-VALIDATION-BINDING.json \
            finalization/evidence/released-release-gate-1.0.json \
            finalization/evidence/released-reports/released-validation-*.json; do
            gh attestation verify "$subject" \
              --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/released-validation-attest.yml" \
              --source-ref "refs/heads/main" \
              --source-digest "$SOURCE_COMMIT" \
              --deny-self-hosted-runners
          done

      - name: verify bindings and create literal released-path claims
        env:
          TAG_NAME: ${{ inputs.tag }}
          SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          python - finalization "$TAG_NAME" "$SOURCE_COMMIT" "$VERSION" <<'PY'
          import hashlib
          import json
          import os
          import re
          import sys
          import urllib.request
          from pathlib import Path

          root = Path(sys.argv[1])
          tag, commit, version = sys.argv[2:5]
          packages = sorted(
              path
              for path in (root / "packages").iterdir()
              if path.name.endswith((".whl", ".tar.gz"))
          )
          if len(packages) != 2 or sum(path.name.endswith(".whl") for path in packages) != 1:
              raise SystemExit("release must contain exactly one wheel and one source distribution")
          expected_files = {
              path.name: hashlib.sha256(path.read_bytes()).hexdigest() for path in packages
          }
          wheel = next(path for path in packages if path.name.endswith(".whl"))
          wheel_sha256 = expected_files[wheel.name]
          manifest = root / "evidence" / "SHA256SUMS"
          declared = {}
          for line in manifest.read_text(encoding="utf-8").splitlines():
              match = re.fullmatch(r"([0-9a-f]{64}) [ *]([^/\\]+)", line)
              if match is None or match.group(2) in declared:
                  raise SystemExit(f"invalid SHA256SUMS entry: {line!r}")
              declared[match.group(2)] = match.group(1)
          local_report = root / "evidence" / "candidate-reports" / "validation-local.json"
          manifest_subjects = {**expected_files, local_report.name: hashlib.sha256(local_report.read_bytes()).hexdigest()}
          candidate_binding_path = root / "evidence" / "LIVE-VALIDATION-BINDING.json"
          candidate_gate_path = root / "evidence" / "candidate-release-gate-1.0.json"
          promotion_path = root / "evidence" / "PYPI-PROMOTION.json"
          released_binding_path = root / "evidence" / "RELEASED-VALIDATION-BINDING.json"
          released_gate_path = root / "evidence" / "released-release-gate-1.0.json"
          ci_status_path = root / "evidence" / "CI-STATUS.json"
          governance_path = root / "evidence" / "REPOSITORY-GOVERNANCE.json"
          candidate_report_manifest = json.loads(
              (root / "evidence" / "candidate-report-assets-after.json").read_text(
                  encoding="utf-8"
              )
          )
          released_report_manifest = json.loads(
              (root / "evidence" / "released-report-assets-after.json").read_text(
                  encoding="utf-8"
              )
          )
          manifest_subjects[ci_status_path.name] = hashlib.sha256(
              ci_status_path.read_bytes()
          ).hexdigest()
          manifest_subjects[governance_path.name] = hashlib.sha256(
              governance_path.read_bytes()
          ).hexdigest()
          if declared != manifest_subjects:
              raise SystemExit("SHA256SUMS does not exactly match the release subjects")
          promotion = json.loads(promotion_path.read_text(encoding="utf-8"))
          promotion_checks = {
              "stage": promotion.get("artifact_stage") == "published",
              "tag": promotion.get("tag") == tag,
              "commit": promotion.get("source_commit") == commit,
              "version": promotion.get("version") == version,
              "wheel": promotion.get("wheel_sha256") == wheel_sha256,
              "candidate_binding": promotion.get("candidate_binding_sha256")
                  == hashlib.sha256(candidate_binding_path.read_bytes()).hexdigest(),
              "candidate_gate": promotion.get("candidate_gate_sha256")
                  == hashlib.sha256(candidate_gate_path.read_bytes()).hexdigest(),
              "workflow": promotion.get("authorized_workflow")
                  == ".github/workflows/release-gate.yml",
          }
          failed_promotion = sorted(
              name for name, passed in promotion_checks.items() if not passed
          )
          if failed_promotion:
              raise SystemExit(f"invalid PyPI promotion record: {failed_promotion}")
          recorded_files = {
              item["filename"]: item.get("sha256")
              for item in promotion.get("distributions", [])
              if isinstance(item, dict) and isinstance(item.get("filename"), str)
          }
          if recorded_files != expected_files:
              raise SystemExit("PyPI promotion record does not match release distributions")
          with urllib.request.urlopen(
              f"https://pypi.org/pypi/clio-relay/{version}/json", timeout=30
          ) as response:
              content = response.read(4 * 1024 * 1024 + 1)
          if len(content) > 4 * 1024 * 1024:
              raise SystemExit("PyPI project metadata exceeds the bounded response size")
          pypi = json.loads(content)
          observed_files = {
              item["filename"]: item.get("digests", {}).get("sha256")
              for item in pypi.get("urls", [])
          }
          if observed_files != expected_files:
              raise SystemExit("current PyPI distribution map differs from the promoted bytes")

          def verify_binding(
              binding_path: Path,
              report_dir: Path,
              report_manifest: dict,
              *,
              stage: str,
              matrix_stage: str,
              workflow: str,
          ) -> tuple[dict, dict[str, dict]]:
              binding = json.loads(binding_path.read_text(encoding="utf-8"))
              matrix = report_manifest.get("acceptance_matrix")
              if not isinstance(matrix, dict):
                  raise SystemExit(f"{stage} report manifest has no acceptance matrix")
              sealer_id = binding.get("sealer_id")
              matrix_report_count = matrix.get("report_count")
              expected_reports = matrix.get("reports")
              checks = {
                  "schema": binding.get("schema_version") == "1.0",
                  "stage": binding.get("artifact_stage") == stage,
                  "tag": binding.get("tag") == tag,
                  "commit": binding.get("source_commit") == commit,
                  "version": binding.get("version") == version,
                  "wheel": binding.get("wheel", {}).get("sha256") == wheel_sha256,
                  "workflow": binding.get("authorized_workflow") == workflow,
                  "trust_model": binding.get("trust_model")
                      == "maintainer_sealed_operator_evidence",
                  "producer_scope": binding.get("producer_execution_verified") is False,
                  "seal_environment": binding.get("seal_environment")
                      == (
                          "live-validation"
                          if stage == "immutable_candidate"
                          else "released-validation"
                      ),
                  "seal_method": binding.get("seal_method")
                      == "write_capable_maintainer_workflow_dispatch",
                  "sealer_login": isinstance(binding.get("sealer_login"), str)
                      and bool(binding["sealer_login"]),
                  "sealer_id": isinstance(sealer_id, int)
                      and not isinstance(sealer_id, bool)
                      and sealer_id > 0,
                  "sealer_permission": binding.get("sealer_permission")
                      in {"admin", "maintain", "write"},
                  "environment_reviewers_not_claimed": binding.get(
                      "environment_reviewers_available"
                  ) is False,
                  "ci_status": binding.get("ci_status_sha256")
                      == hashlib.sha256(ci_status_path.read_bytes()).hexdigest(),
                  "repository_governance": binding.get(
                      "repository_governance_sha256"
                  ) == hashlib.sha256(governance_path.read_bytes()).hexdigest(),
                  "acceptance_matrix": binding.get("acceptance_matrix") == matrix,
                  "matrix_stage": matrix.get("stage") == matrix_stage,
                  "matrix_artifact_stage": matrix.get("artifact_stage") == stage,
                  "matrix_version": matrix.get("release_version") == version,
                  "matrix_report_count": isinstance(matrix_report_count, int)
                      and not isinstance(matrix_report_count, bool)
                      and matrix_report_count > 0
                      and isinstance(expected_reports, list)
                      and len(expected_reports) == matrix_report_count,
              }
              failed = sorted(name for name, passed in checks.items() if not passed)
              if failed:
                  raise SystemExit(f"invalid {stage} validation binding: {failed}")
              declared_reports = {}
              declared_report_list = binding.get("reports", [])
              if (
                  not isinstance(declared_report_list, list)
                  or not isinstance(expected_reports, list)
                  or len(declared_report_list) != matrix_report_count
                  or len(expected_reports) != matrix_report_count
              ):
                  raise SystemExit(f"{stage} binding does not contain the exact matrix")
              for item in declared_report_list:
                  if not isinstance(item, dict) or not isinstance(item.get("filename"), str):
                      raise SystemExit(f"invalid {stage} binding report entry")
                  if item["filename"] in declared_reports:
                      raise SystemExit(f"duplicate {stage} report filename")
                  declared_reports[item["filename"]] = item
              observed_reports = {}
              invocation_ids = set()
              expected_kind = "wheel" if stage == "immutable_candidate" else "pypi"
              expected_released = stage == "published"
              for expected_report in expected_reports:
                  if not isinstance(expected_report, dict):
                      raise SystemExit(f"invalid {stage} acceptance matrix report")
                  path = report_dir / str(expected_report.get("filename"))
                  document = json.loads(path.read_text(encoding="utf-8"))
                  item = declared_reports.get(path.name, {})
                  trust = document.get("evidence_trust", {})
                  software = document.get("software", {})
                  source = document.get("install_source", {})
                  launcher_receipt = source.get("launcher_receipt", {})
                  producer_id = trust.get("producer_github_id")
                  invocation_id = trust.get("invocation_id")
                  report_checks = {
                      "sha256": item.get("sha256")
                          == hashlib.sha256(path.read_bytes()).hexdigest(),
                      "report_id": item.get("report_id") == document.get("report_id"),
                      "scenario": item.get("scenario") == document.get("scenario"),
                      "cluster": item.get("cluster") == document.get("cluster"),
                      "matrix_id": item.get("acceptance_id") == expected_report.get("id"),
                      "matrix_ordinal": item.get("ordinal") == expected_report.get("ordinal"),
                      "matrix_scenario": document.get("scenario")
                          == expected_report.get("scenario"),
                      "matrix_cluster": document.get("cluster")
                          == expected_report.get("cluster"),
                      "status": document.get("status") == "passed",
                      "version": software.get("version") == version,
                      "tag": software.get("tag") == tag,
                      "commit": software.get("commit") == commit,
                      "clean": software.get("dirty") is False,
                      "distribution_version": source.get("distribution_version") == version,
                      "artifact_sha256": source.get("artifact_sha256") == wheel_sha256,
                      "artifact_identity": source.get("artifact_identity_verified") is True,
                      "source_kind": source.get("kind") == expected_kind,
                      "detected_source_kind": source.get("detected_kind") == expected_kind,
                      "released_claim": source.get("released_artifact") is expected_released,
                      "launcher": source.get("launcher") == "uv-tool",
                      "launcher_verified": source.get("launcher_verified") is True,
                      "tool_environment": launcher_receipt.get("tool_environment_verified") is True,
                      "tool_bin_bound": launcher_receipt.get("tool_bin_bound") is True,
                      "tool_target_bound": launcher_receipt.get("tool_target_bound") is True,
                      "record_closure": launcher_receipt.get("distribution_record", {}).get("verified") is True,
                      "producer_login": trust.get("producer_github_login")
                          == item.get("producer_github_login")
                          == item.get("uploader_github_login"),
                      "producer_id": isinstance(producer_id, int)
                          and not isinstance(producer_id, bool)
                          and producer_id > 0
                          and producer_id == item.get("producer_github_id")
                          == item.get("uploader_github_id"),
                      "invocation_id": isinstance(invocation_id, str)
                          and 16 <= len(invocation_id) <= 256
                          and invocation_id == item.get("invocation_id")
                          and invocation_id not in invocation_ids,
                      "launcher_invocation": launcher_receipt.get("invocation_id")
                          == invocation_id,
                      "uv_version": launcher_receipt.get("uv_version") == "0.11.28",
                      "bound_uv_version": launcher_receipt.get("uv_version")
                          == item.get("uv_version"),
                      "uv_executable_sha256": isinstance(
                          launcher_receipt.get("uv_executable_sha256"), str
                      )
                          and re.fullmatch(
                              r"[0-9a-f]{64}", launcher_receipt["uv_executable_sha256"]
                          )
                          is not None
                          and launcher_receipt.get("uv_executable_sha256")
                          == item.get("uv_executable_sha256"),
                  }
                  if not all(report_checks.values()):
                      raise SystemExit(
                          f"bound report mismatch for {path.name}: {report_checks}"
                      )
                  observed_reports[path.name] = document
                  invocation_ids.add(invocation_id)
              if set(declared_reports) != set(observed_reports):
                  raise SystemExit(
                      f"{stage} report set differs from binding: "
                      f"declared={sorted(declared_reports)}, observed={sorted(observed_reports)}"
                  )
              return binding, observed_reports

          candidate_binding, _ = verify_binding(
              candidate_binding_path,
              root / "evidence" / "candidate-reports",
              candidate_report_manifest,
              stage="immutable_candidate",
              matrix_stage="candidate",
              workflow=".github/workflows/live-validation-attest.yml",
          )
          released_binding, released_reports = verify_binding(
              released_binding_path,
              root / "evidence" / "released-reports",
              released_report_manifest,
              stage="published",
              matrix_stage="released",
              workflow=".github/workflows/released-validation-attest.yml",
          )
          candidate_matrix = candidate_binding["acceptance_matrix"]
          released_matrix = released_binding["acceptance_matrix"]
          candidate_matrix_ids = [item["id"] for item in candidate_matrix["reports"]]
          released_matrix_ids = [item["id"] for item in released_matrix["reports"]]
          if (
              candidate_matrix.get("sha256") != released_matrix.get("sha256")
              or candidate_matrix.get("schema_version")
                  != released_matrix.get("schema_version")
              or candidate_matrix.get("release_version")
                  != released_matrix.get("release_version")
              or candidate_matrix.get("report_count") != released_matrix.get("report_count")
              or candidate_matrix_ids != released_matrix_ids
          ):
              raise SystemExit("candidate and released evidence bind different matrices")
          candidate_invocations = {
              item["invocation_id"] for item in candidate_binding["reports"]
          }
          released_invocations = {
              item["invocation_id"] for item in released_binding["reports"]
          }
          if candidate_invocations.intersection(released_invocations):
              raise SystemExit(
                  "candidate and released validation invocation ids must be globally unique"
              )
          if released_binding.get("publication_record_sha256") != hashlib.sha256(
              promotion_path.read_bytes()
          ).hexdigest():
              raise SystemExit("released binding does not identify the PyPI publication record")
          candidate_decision = json.loads(candidate_gate_path.read_text(encoding="utf-8"))
          candidate_document_ids = [
              item["report_id"] for item in candidate_binding["reports"]
          ]
          candidate_decision_checks = {
              "passed": candidate_decision.get("passed") is True,
              "matrix_schema": candidate_decision.get("acceptance_matrix_schema_version")
                  == candidate_matrix.get("schema_version"),
              "matrix_version": candidate_decision.get("acceptance_matrix_release_version")
                  == candidate_matrix.get("release_version"),
              "matrix_digest": candidate_decision.get("acceptance_matrix_sha256")
                  == candidate_matrix.get("sha256"),
              "matrix_stage": candidate_decision.get("acceptance_matrix_stage")
                  == "candidate",
              "matrix_ids": candidate_decision.get("acceptance_report_ids")
                  == candidate_matrix_ids,
              "matrix_document_ids": candidate_decision.get(
                  "acceptance_report_document_ids"
              ) == candidate_document_ids,
          }
          failed_candidate_decision = sorted(
              name for name, passed in candidate_decision_checks.items() if not passed
          )
          if failed_candidate_decision:
              raise SystemExit(
                  f"invalid candidate gate matrix binding: {failed_candidate_decision}"
              )
          decision = json.loads(released_gate_path.read_text(encoding="utf-8"))
          decision_checks = {
              "passed": decision.get("passed") is True,
              "digest": decision.get("artifact_sha256") == wheel_sha256,
              "version": decision.get("release_version") == version,
              "unsatisfied": decision.get("unsatisfied_requirements") == {},
              "observed_target_identities": isinstance(
                  decision.get("target_identity_sha256"), dict
              ) and bool(decision["target_identity_sha256"]),
              "policy_target_identities": isinstance(
                  decision.get("policy_target_identity_sha256"), dict
              ) and decision.get("policy_target_identity_sha256")
                  == decision.get("target_identity_sha256"),
              "matrix_schema": decision.get("acceptance_matrix_schema_version")
                  == released_matrix.get("schema_version"),
              "matrix_version": decision.get("acceptance_matrix_release_version")
                  == released_matrix.get("release_version"),
              "matrix_digest": decision.get("acceptance_matrix_sha256")
                  == released_matrix.get("sha256"),
              "matrix_stage": decision.get("acceptance_matrix_stage") == "released",
              "matrix_ids": decision.get("acceptance_report_ids")
                  == released_matrix_ids,
              "matrix_document_count": len(
                  decision.get("acceptance_report_document_ids", [])
              ) == released_matrix.get("report_count"),
          }
          failed_decision = sorted(
              name for name, passed in decision_checks.items() if not passed
          )
          if failed_decision:
              raise SystemExit(f"invalid released gate decision: {failed_decision}")
          released_by_id = {
              document.get("report_id"): {
                  "filename": filename,
                  "cluster": document.get("cluster"),
                  "scenario": document.get("scenario"),
                  "producer_github_login": document.get("evidence_trust", {}).get(
                      "producer_github_login"
                  ),
                  "producer_github_id": document.get("evidence_trust", {}).get(
                      "producer_github_id"
                  ),
                  "invocation_id": document.get("evidence_trust", {}).get(
                      "invocation_id"
                  ),
                  "uv_version": document.get("install_source", {})
                      .get("launcher_receipt", {})
                      .get("uv_version"),
                  "uv_executable_sha256": document.get("install_source", {})
                      .get("launcher_receipt", {})
                      .get("uv_executable_sha256"),
              }
              for filename, document in released_reports.items()
          }
          decision_report_ids = decision.get("report_ids")
          if not isinstance(decision_report_ids, list) or not all(
              isinstance(report_id, str) and report_id for report_id in decision_report_ids
          ) or len(decision_report_ids) != len(set(decision_report_ids)):
              raise SystemExit("final decision report ids are invalid or duplicated")
          local_document = json.loads(local_report.read_text(encoding="utf-8"))
          local_report_id = local_document.get("report_id")
          if not isinstance(local_report_id, str) or local_report_id not in decision_report_ids:
              raise SystemExit("final decision does not identify the exact local report")
          if local_report_id in released_by_id:
              raise SystemExit("local and released reports must have distinct report ids")
          unknown_report_ids = set(decision_report_ids) - {
              local_report_id,
              *released_by_id,
          }
          if unknown_report_ids:
              raise SystemExit(
                  f"final decision contains unbound report ids: {sorted(unknown_report_ids)}"
              )
          nonlocal_report_ids = [
              report_id for report_id in decision_report_ids if report_id != local_report_id
          ]
          if not nonlocal_report_ids or any(
              report_id not in released_by_id for report_id in nonlocal_report_ids
          ):
              raise SystemExit(
                  "every non-local final decision report must resolve to sealed released evidence"
              )
          used_reports = [released_by_id[report_id] for report_id in nonlocal_report_ids]
          if not used_reports:
              raise SystemExit("final decision does not use released-artifact live reports")
          ordered_document_ids = decision.get("acceptance_report_document_ids")
          if (
              not isinstance(ordered_document_ids, list)
              or len(ordered_document_ids) != released_matrix.get("report_count")
              or set(ordered_document_ids) != set(nonlocal_report_ids)
          ):
              raise SystemExit(
                  "final decision matrix order does not exactly cover sealed released reports"
              )
          released_binding_by_filename = {
              item["filename"]: item for item in released_binding["reports"]
          }
          used_reports = []
          for report_id in ordered_document_ids:
              report = released_by_id[report_id]
              bound = released_binding_by_filename[report["filename"]]
              used_reports.append(
                  {
                      **report,
                      "acceptance_id": bound["acceptance_id"],
                      "ordinal": bound["ordinal"],
                  }
              )
          all_requirements = decision.get("satisfied_requirements", [])
          local_requirements = [
              requirement
              for requirement in all_requirements
              if requirement == "local-release-gate"
          ]
          released_requirements = [
              requirement
              for requirement in all_requirements
              if requirement not in local_requirements
          ]
          if not local_requirements or not released_requirements:
              raise SystemExit("final decision does not separate local and released gates")
          ci_status = json.loads(ci_status_path.read_text(encoding="utf-8"))
          governance = json.loads(governance_path.read_text(encoding="utf-8"))
          claims = {
              "schema_version": "1.1",
              "artifact_stage": "published",
              "tag": tag,
              "source_commit": commit,
              "version": version,
              "install_path": f"uv tool install clio-relay=={version}; clio-relay",
              "wheel": {"filename": wheel.name, "sha256": wheel_sha256},
              "policy": "docs/release-gate-1.0.yaml",
              "acceptance_matrix": {
                  "schema_version": released_matrix["schema_version"],
                  "release_version": released_matrix["release_version"],
                  "sha256": released_matrix["sha256"],
                  "report_count": released_matrix["report_count"],
                  "candidate_stage": candidate_matrix["stage"],
                  "released_stage": released_matrix["stage"],
                  "ordered_report_ids": released_matrix_ids,
                  "ordered_report_document_ids": ordered_document_ids,
              },
              "target_identity_sha256": decision["target_identity_sha256"],
              "policy_target_identity_sha256": decision[
                  "policy_target_identity_sha256"
              ],
              "ci_status": {
                  "sha256": hashlib.sha256(ci_status_path.read_bytes()).hexdigest(),
                  "run_id": ci_status.get("run_id"),
                  "run_attempt": ci_status.get("run_attempt"),
                  "required_jobs": ci_status.get("required_jobs"),
              },
              "repository_governance": {
                  "sha256": hashlib.sha256(governance_path.read_bytes()).hexdigest(),
                  "main_protection": governance.get("main_protection"),
                  "tag_protections": governance.get("tag_protections"),
                  "environment_reviewers_available": governance.get(
                      "environment_reviewers_available"
                  ),
                  "environments": governance.get("environments"),
                  "immutable_releases": governance.get("immutable_releases"),
              },
              "release_publication": {
                  "github_release_immutable": True,
                  "verification": ["gh release verify", "gh release verify-asset"],
              },
              "local_quality_requirements": local_requirements,
              "released_artifact_requirements": released_requirements,
              "released_reports": used_reports,
              "clusters": sorted({item["cluster"] for item in used_reports}),
              "scenarios": sorted({item["scenario"] for item in used_reports}),
              "evidence_trust_model": "maintainer_sealed_operator_evidence",
              "producer_execution_verified": False,
              "evidence_sealers": sorted(
                  [
                      {
                          "login": candidate_binding["sealer_login"],
                          "id": candidate_binding["sealer_id"],
                          "permission": candidate_binding["sealer_permission"],
                      },
                      {
                          "login": released_binding["sealer_login"],
                          "id": released_binding["sealer_id"],
                          "permission": released_binding["sealer_permission"],
                      },
                  ],
                  key=lambda item: item["id"],
              ),
              "authorized_workflow": ".github/workflows/finalize-release.yml",
          }
          claims_path = root / "evidence" / "RELEASE-CLAIMS.json"
          claims_path.write_text(
              json.dumps(claims, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          notes = (
              f"clio-relay {tag}\n\n"
              "Production release for durable desktop-to-cluster execution.\n\n"
              "Highlights:\n\n"
              "- Generic cluster-aware virtualization of registered remote MCP servers.\n"
              "- Explicit detach and owned-resource cleanup, with scheduler jobs preserved by default.\n"
              "- Provider-specific scheduler lifecycle handling and structured JARVIS runtime metadata.\n"
              "- Machine-readable progress, artifacts, provenance, and live-validation reports.\n\n"
              f"The exact PyPI artifact was installed with "
              f"`uv tool install clio-relay=={version}` and validated on "
              f"{', '.join(claims['clusters'])}. See `RELEASE-CLAIMS.json` and the "
              "attached candidate/released reports for the complete evidence. "
              "The published GitHub release and every attached asset are immutable.\n"
          )
          (root / "evidence" / "RELEASE-NOTES.md").write_text(notes, encoding="utf-8")
          PY

      - name: revalidate protected main immediately before final-claims attestation
        if: steps.release.outputs.is_draft == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: >-
          python src/clio_relay/ci_validation.py mutation-authority
          --governance-receipt finalization/evidence/REPOSITORY-GOVERNANCE.json
          --repository "$REPOSITORY"
          --source-commit "$SOURCE_COMMIT"
          --tag "$TAG_NAME"
          --workflow-ref "$GITHUB_REF"
          --workflow-sha "$GITHUB_SHA"
          --release-state present
          --draft true

      - name: attest the final literal claim set
        if: steps.release.outputs.is_draft == 'true'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: finalization/evidence/RELEASE-CLAIMS.json

      - name: attach claims idempotently before publication
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          source .github/scripts/release-api.sh
          python src/clio_relay/ci_validation.py verify-live-release \
            --repository "$REPOSITORY" \
            --tag "$TAG_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --draft any \
            --prerelease false
          claims=finalization/evidence/RELEASE-CLAIMS.json
          mkdir -p existing-claims
          relay_release_resolve "$TAG_NAME" any "$RUNNER_TEMP/claims-release.json"
          relay_release_complete_assets "$RUNNER_TEMP/claims-release.json" \
            "$RUNNER_TEMP/claims-release-assets.json"
          if relay_release_asset_id "$RUNNER_TEMP/claims-release-assets.json" \
            RELEASE-CLAIMS.json >/dev/null; then
            relay_release_download_exact "$RUNNER_TEMP/claims-release-assets.json" \
              RELEASE-CLAIMS.json existing-claims/RELEASE-CLAIMS.json
            cmp --silent "$claims" existing-claims/RELEASE-CLAIMS.json
          else
            asset_status="$?"
            test "$asset_status" -eq 1
            python src/clio_relay/ci_validation.py mutation-authority \
              --governance-receipt finalization/evidence/REPOSITORY-GOVERNANCE.json \
              --repository "$REPOSITORY" \
              --source-commit "$SOURCE_COMMIT" \
              --tag "$TAG_NAME" \
              --workflow-ref "$GITHUB_REF" \
              --workflow-sha "$GITHUB_SHA" \
              --release-state present \
              --draft true
            relay_release_upload_exact "$RUNNER_TEMP/claims-release-assets.json" "$claims"
          fi

      - name: verify final claims attestation on first run or retry
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
        shell: bash
        run: >-
          gh attestation verify finalization/evidence/RELEASE-CLAIMS.json
          --repo "$REPOSITORY"
          --signer-workflow "$REPOSITORY/.github/workflows/finalize-release.yml"
          --source-ref "refs/heads/main"
          --source-digest "$SOURCE_COMMIT"
          --deny-self-hosted-runners

      - name: bind exact final assets, publish once, and verify published equality
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          REVIEWED_MAIN_SHA: ${{ inputs.reviewed_main_sha }}
          SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          source .github/scripts/authenticated-git.sh
          source .github/scripts/release-api.sh
          relay_authenticated_git_fetch --force --no-tags origin \
            refs/heads/main:refs/remotes/origin/main
          test "$SOURCE_COMMIT" = "$REVIEWED_MAIN_SHA"
          test "$SOURCE_COMMIT" = "$(git rev-parse refs/remotes/origin/main)"
          python src/clio_relay/ci_validation.py verify-live-release \
            --repository "$REPOSITORY" \
            --tag "$TAG_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --draft any \
            --prerelease false
          notes=finalization/evidence/RELEASE-NOTES.md
          relay_release_resolve "$TAG_NAME" any "$RUNNER_TEMP/final-release-current.json"
          is_draft="$(jq -r .draft "$RUNNER_TEMP/final-release-current.json")"
          [[ "$is_draft" == "true" || "$is_draft" == "false" ]]
          if test "$is_draft" = "true"; then
            python src/clio_relay/ci_validation.py mutation-authority \
              --governance-receipt finalization/evidence/REPOSITORY-GOVERNANCE.json \
              --repository "$REPOSITORY" \
              --source-commit "$SOURCE_COMMIT" \
              --tag "$TAG_NAME" \
              --workflow-ref "$GITHUB_REF" \
              --workflow-sha "$GITHUB_SHA" \
              --release-state present \
              --draft true
          else
            python src/clio_relay/ci_validation.py verify-live-governance \
              --receipt finalization/evidence/REPOSITORY-GOVERNANCE.json \
              --repository "$REPOSITORY" \
              --source-commit "$SOURCE_COMMIT" \
              --tag "$TAG_NAME"
            python src/clio_relay/ci_validation.py verify-live-release \
              --repository "$REPOSITORY" \
              --tag "$TAG_NAME" \
              --source-commit "$SOURCE_COMMIT" \
              --draft false \
              --prerelease false \
              --immutable true
          fi
          final_assets=(
            finalization/packages/*.whl
            finalization/packages/*.tar.gz
            finalization/evidence/candidate-reports/validation-*.json
            finalization/evidence/released-reports/released-validation-*.json
            finalization/evidence/SHA256SUMS
            finalization/evidence/CI-STATUS.json
            finalization/evidence/REPOSITORY-GOVERNANCE.json
            finalization/evidence/LIVE-VALIDATION-BINDING.json
            finalization/evidence/candidate-release-gate-1.0.json
            finalization/evidence/PYPI-PROMOTION.json
            finalization/evidence/RELEASED-VALIDATION-BINDING.json
            finalization/evidence/released-release-gate-1.0.json
            finalization/evidence/RELEASE-CLAIMS.json
          )
          asset_args=()
          for asset in "${final_assets[@]}"; do
            asset_args+=(--asset "$asset")
          done
          capture_release_assets() {
            local suffix="$1"
            relay_release_resolve "$TAG_NAME" any "$RUNNER_TEMP/final-release-$suffix.json"
            relay_release_complete_assets "$RUNNER_TEMP/final-release-$suffix.json" \
              "$RUNNER_TEMP/final-release-assets-$suffix.json"
            printf '[]\n' > "$RUNNER_TEMP/final-assets-$suffix-page-2.json"
          }
          capture_release_assets before-publish
          python src/clio_relay/ci_validation.py exact-release-assets \
            --release "$RUNNER_TEMP/final-release-assets-before-publish.json" \
            --next-assets-page "$RUNNER_TEMP/final-assets-before-publish-page-2.json" \
            --page-size 100 \
            "${asset_args[@]}" \
            --output "$RUNNER_TEMP/EXACT-FINAL-ASSETS.json"
          if test "$is_draft" = "true"; then
            python src/clio_relay/ci_validation.py mutation-authority \
              --governance-receipt finalization/evidence/REPOSITORY-GOVERNANCE.json \
              --repository "$REPOSITORY" \
              --source-commit "$SOURCE_COMMIT" \
              --tag "$TAG_NAME" \
              --workflow-ref "$GITHUB_REF" \
              --workflow-sha "$GITHUB_SHA" \
              --release-state present \
              --draft true
            jq -n --rawfile body "$notes" \
              '{body: $body, draft: false, prerelease: false}' \
              > "$RUNNER_TEMP/publish-release.json"
            relay_release_patch "$RUNNER_TEMP/final-release-before-publish.json" \
              "$RUNNER_TEMP/publish-release.json" "$RUNNER_TEMP/published-release.json"
          else
            actual="$(jq -r .body "$RUNNER_TEMP/final-release-before-publish.json")"
            expected="$(cat "$notes")"
            test "$actual" = "$expected"
          fi
          release_id="$(jq -r .id "$RUNNER_TEMP/final-release-before-publish.json")"
          release_target="$(jq -r .target_commitish \
            "$RUNNER_TEMP/final-release-before-publish.json")"
          for attempt in $(seq 1 20); do
            relay_release_resolve "$TAG_NAME" false \
              "$RUNNER_TEMP/final-release-immutable.json"
            test "$(jq -r .id "$RUNNER_TEMP/final-release-immutable.json")" = "$release_id"
            test "$(jq -r .tag_name "$RUNNER_TEMP/final-release-immutable.json")" = "$TAG_NAME"
            test "$(jq -r .target_commitish \
              "$RUNNER_TEMP/final-release-immutable.json")" = "$release_target"
            if test "$(jq -r .immutable \
              "$RUNNER_TEMP/final-release-immutable.json")" = "true"; then
              break
            fi
            test "$attempt" -lt 20
            sleep 3
          done
          capture_release_assets published
          python src/clio_relay/ci_validation.py exact-release-assets \
            --release "$RUNNER_TEMP/final-release-assets-published.json" \
            --next-assets-page "$RUNNER_TEMP/final-assets-published-page-2.json" \
            --page-size 100 \
            "${asset_args[@]}" \
            --verify-existing "$RUNNER_TEMP/EXACT-FINAL-ASSETS.json"
          test "$(jq -r .draft "$RUNNER_TEMP/final-release-published.json")" = "false"
          test "$(jq -r .prerelease "$RUNNER_TEMP/final-release-published.json")" = "false"
          test "$(jq -r .immutable "$RUNNER_TEMP/final-release-published.json")" = "true"
          for attempt in $(seq 1 20); do
            if gh release verify "$TAG_NAME" --repo "$REPOSITORY"; then
              break
            fi
            test "$attempt" -lt 20
            sleep 3
          done
          for asset in "${final_assets[@]}"; do
            gh release verify-asset "$TAG_NAME" "$asset" --repo "$REPOSITORY"
          done
