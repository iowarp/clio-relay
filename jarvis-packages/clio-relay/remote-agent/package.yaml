name: clio-relay.remote-agent
description: Execute a configured remote-agent task under JARVIS-CD.
script: run.py
parameters:
  agent_bin:
    type: string
    required: true
  agent_adapter:
    type: string
    required: false
  agent_args:
    type: array
    required: false
  prompt_path:
    type: string
    required: true
  mcp_config_path:
    type: string
    required: false
  model:
    type: string
    required: false
  workdir:
    type: string
    required: false
  timeout_seconds:
    type: integer
    required: false
