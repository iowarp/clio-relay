      - worker.running
      - worker.service-enabled
      - worker.service-persistence
      - worker.artifact-version
      - worker.artifact-sha256
      - worker.source-identity
      - worker.scheduler-provider
      - worker.target-identity
      - worker.component-clio-kit-released
      - worker.component-clio-kit-native-jarvis-contract
      - worker.component-jarvis-native-execution
      - worker.execute
    required_resource_kinds:
      - relay_worker
      - relay_job
      - cluster_target
    required_resources:
      - kind: relay_worker
        roles: [cluster_worker]
        states: [running]
        metadata_equals:
          components:
            clio-kit: "2.5.5"
            jarvis-cd: "1.3.12"
            jarvis-util: c91bfdc9bba802e4b03bfb1babe614ffa3e09644
          component_artifacts:
            clio-kit:
              distribution: clio-kit
              distribution_version: "2.5.5"
              install_spec: https://github.com/iowarp/clio-kit/releases/download/v2.5.5/clio_kit-2.5.5-py3-none-any.whl
              requested_source: github_release
              artifact_sha256: 622344b951d39f35b0952d2bf056d83040b81ad52e4aca4794fa486026eab278
              native_execution:
                schema_version: clio-relay.jarvis-native-execution-capability.v1
                handle_schema: jarvis.execution.handle.v1
                record_schema: jarvis.execution.record.v1
                progress_schema: jarvis.execution.progress.v1
                operations: [jarvis_get_execution, jarvis_run]
                contract_id: clio-kit-jarvis-user-v3.2
                contract_schema_version: clio-kit.mcp-user-contract.v1
                contract_sha256: 12f6d349c9d44d8ce3594943dcd4018ec9b6e01ebb0e59d468bb1bb783a1ad5d
            jarvis-cd:
              distribution: jarvis_cd
              distribution_version: "1.3.12"
              install_spec: https://github.com/grc-iit/jarvis-cd/releases/download/v1.3.12/jarvis_cd-1.3.12-py3-none-any.whl
              requested_source: github_release
              artifact_filename: jarvis_cd-1.3.12-py3-none-any.whl
              artifact_sha256: 67541dde02e13842ab7a1581717a3577869f3d6ff7db4faf0238fd8c6319d3e3
